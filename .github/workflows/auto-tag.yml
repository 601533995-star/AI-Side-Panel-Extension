name: AI Side Panel main
run-name: "AI Side Panel ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
    paths:
      - 'Source/manifest.json'

permissions:
  contents: write

jobs:
  release:
    name: Tag, build & publish release
    runs-on: ubuntu-latest

    steps:
      # в”Ђв”Ђ 1. Checkout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # в”Ђв”Ђ 2. Read metadata в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Read version from manifest.json
        id: manifest
        run: |
          VERSION=$(jq -r '.version' Source/manifest.json)
          NAME=$(jq -r '.name' Source/manifest.json)
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"        >> "$GITHUB_OUTPUT"
          echo "extension_name=$NAME" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ 3. Check if tag already exists (skip if re-push without version bump) в”Ђ
      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.manifest.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # в”Ђв”Ђ 4. Create and push tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.manifest.outputs.tag }}" -m "Release ${{ steps.manifest.outputs.tag }}"
          git push origin "${{ steps.manifest.outputs.tag }}"

      # в”Ђв”Ђ 5. Generate changelog from commits since last tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate changelog
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          CURRENT_TAG="${{ steps.manifest.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -n1 || true)

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          FEATURES=$(echo "$COMMITS" | grep -iE "^- feat"                                   || true)
          FIXES=$(echo    "$COMMITS" | grep -iE "^- fix"                                    || true)
          CHORES=$(echo   "$COMMITS" | grep -iE "^- chore|^- refactor|^- perf|^- build"    || true)
          DOCS=$(echo     "$COMMITS" | grep -iE "^- docs"                                   || true)
          OTHER=$(echo    "$COMMITS" | grep -ivE "^- (feat|fix|chore|refactor|perf|build|docs)" || true)

          NOTES=""
          [ -n "$FEATURES" ] && NOTES+="### вњЁ New Features"$'\n'"$FEATURES"$'\n\n'
          [ -n "$FIXES"    ] && NOTES+="### рџђ› Bug Fixes"$'\n'"$FIXES"$'\n\n'
          [ -n "$CHORES"   ] && NOTES+="### рџ”§ Maintenance"$'\n'"$CHORES"$'\n\n'
          [ -n "$DOCS"     ] && NOTES+="### рџ“ќ Documentation"$'\n'"$DOCS"$'\n\n'
          [ -n "$OTHER"    ] && NOTES+="### рџ“¦ Other Changes"$'\n'"$OTHER"$'\n\n'
          [ -z "$NOTES"    ] && NOTES="No notable changes in this release."

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ 6. Package the extension as a .zip в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build extension zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          ZIP_NAME="AI-Side-Panel-${{ steps.manifest.outputs.tag }}.zip"
          cd Source
          zip -r "../$ZIP_NAME" . \
            --exclude "*.DS_Store" \
            --exclude "*Thumbs.db" \
            --exclude "*.map"
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      # в”Ђв”Ђ 7. Publish GitHub Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: "${{ steps.manifest.outputs.extension_name }} ${{ steps.manifest.outputs.tag }}"
          body: |
            ## ${{ steps.manifest.outputs.extension_name }} ${{ steps.manifest.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### рџ“Ґ Installation
            Download the `.zip` below, unzip it, then load it as an **unpacked extension** in Chrome/Edge (`chrome://extensions` в†’ *Load unpacked*).

            > **Store links:**
            > [Chrome Web Store](https://chromewebstore.google.com/detail/ai-side-panel/icapcpllhdnnpcmfdcgpnbgchfenmjmg) В· [Edge Add-ons](https://microsoftedge.microsoft.com/addons/detail/ai-side-panel/okldldohcpoeldjackkdakhoflphiipn)

            **Full Changelog:** ${{ steps.changelog.outputs.previous_tag != '' && format('https://github.com/{0}/compare/{1}...{2}', github.repository, steps.changelog.outputs.previous_tag, steps.manifest.outputs.tag) || format('https://github.com/{0}/commits/{1}', github.repository, steps.manifest.outputs.tag) }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(steps.manifest.outputs.tag, '-beta') || contains(steps.manifest.outputs.tag, '-alpha') || contains(steps.manifest.outputs.tag, '-rc') }}
