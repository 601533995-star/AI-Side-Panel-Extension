name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for changelog generation

      # ── 2. Read metadata ─────────────────────────────────────────────────────
      - name: Read version from manifest.json
        id: manifest
        run: |
          VERSION=$(jq -r '.version' Source/manifest.json)
          NAME=$(jq -r '.name'    Source/manifest.json)
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "extension_name=$NAME"    >> "$GITHUB_OUTPUT"

      # ── 3. Generate changelog from commits since last tag ────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            # First ever release — list all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          # Categorise by conventional-commit prefix (feat/fix/chore/docs/…)
          FEATURES=$(echo "$COMMITS"  | grep -iE "^- feat"     || true)
          FIXES=$(echo "$COMMITS"     | grep -iE "^- fix"      || true)
          CHORES=$(echo "$COMMITS"    | grep -iE "^- chore|^- refactor|^- perf|^- build" || true)
          DOCS=$(echo "$COMMITS"      | grep -iE "^- docs"     || true)
          OTHER=$(echo "$COMMITS"     | grep -ivE "^- (feat|fix|chore|refactor|perf|build|docs)" || true)

          NOTES=""
          [ -n "$FEATURES" ] && NOTES+="### ✨ New Features"$'\n'"$FEATURES"$'\n\n'
          [ -n "$FIXES"    ] && NOTES+="### 🐛 Bug Fixes"$'\n'"$FIXES"$'\n\n'
          [ -n "$CHORES"   ] && NOTES+="### 🔧 Maintenance"$'\n'"$CHORES"$'\n\n'
          [ -n "$DOCS"     ] && NOTES+="### 📝 Documentation"$'\n'"$DOCS"$'\n\n'
          [ -n "$OTHER"    ] && NOTES+="### 📦 Other Changes"$'\n'"$OTHER"$'\n\n'

          if [ -z "$NOTES" ]; then
            NOTES="No notable changes in this release."
          fi

          # Write multi-line output safely
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      # ── 4. Package the extension as a .zip ───────────────────────────────────
      - name: Build extension zip
        run: |
          ZIP_NAME="AI-Side-Panel-v${{ steps.manifest.outputs.version }}.zip"
          cd Source
          zip -r "../$ZIP_NAME" . \
            --exclude "*.DS_Store" \
            --exclude "*Thumbs.db" \
            --exclude "*.map"
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      # ── 5. Publish GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.manifest.outputs.extension_name }} ${{ github.ref_name }}"
          body: |
            ## ${{ steps.manifest.outputs.extension_name }} ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📥 Installation
            Download the `.zip` below, unzip it, then load it as an **unpacked extension** in Chrome/Edge (`chrome://extensions` → *Load unpacked*).

            > **Store links:**
            > [Chrome Web Store](https://chromewebstore.google.com/detail/ai-side-panel/icapcpllhdnnpcmfdcgpnbgchfenmjmg) · [Edge Add-ons](https://microsoftedge.microsoft.com/addons/detail/ai-side-panel/okldldohcpoeldjackkdakhoflphiipn)

            **Full Changelog:** ${{ steps.changelog.outputs.previous_tag && format('https://github.com/{0}/compare/{1}...{2}', github.repository, steps.changelog.outputs.previous_tag, github.ref_name) || format('https://github.com/{0}/commits/{1}', github.repository, github.ref_name) }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
